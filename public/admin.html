<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Stopper — Story Engineering</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #161616;
      --border: #282828;
      --accent: #1B5EFF;
      --accent-dim: rgba(27,94,255,0.12);
      --text: #f0f0f0;
      --muted: #777;
      --success: #22c55e;
      --danger: #ef4444;
      --font: 'Space Mono', 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ── Sticky header ── */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .top-bar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-bar h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .top-bar .sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.3px;
      display: none;
    }

    @media (min-width: 500px) {
      .top-bar .sub { display: inline; }
    }

    .top-bar .spacer { flex: 1; }

    .btn-new {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 0;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 10px 18px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .btn-new:hover { opacity: 0.88; }
    .btn-new:active { transform: scale(0.97); }

    /* ── New test form ── */
    .new-form {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 24px 0;
      display: none;
    }

    .new-form.open { display: block; }

    .new-form-inner {
      background: var(--surface);
      border: 1px solid var(--accent);
      padding: 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .new-form-inner .field {
      flex: 1;
    }

    .new-form-inner label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .new-form-inner input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      font-family: var(--font);
      letter-spacing: 0.5px;
    }

    .new-form-inner input:focus { border-color: var(--accent); }

    .btn-create {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 11px 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .btn-create:hover { opacity: 0.88; }
    .btn-create:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Session list ── */
    .session-list {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 24px;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 80px 20px;
      letter-spacing: 0.3px;
    }

    .session-row {
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 8px;
      transition: border-color 0.15s;
      display: flex;
    }

    .session-row:hover { border-color: #444; }

    .session-indicator {
      width: 4px;
      background: var(--accent);
      flex-shrink: 0;
    }

    .session-body {
      flex: 1;
      padding: 14px 16px;
    }

    .session-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .session-info {
      flex: 1;
      min-width: 0;
    }

    .session-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: text;
    }

    .session-name:hover { color: var(--accent); }

    .session-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    .session-actions {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      overflow-x: auto;
    }

    .action-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 6px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .action-btn:hover { color: var(--text); border-color: var(--muted); }
    .action-btn.setup-btn:hover { color: var(--accent); border-color: var(--accent); }
    .action-btn.launch-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
    .action-btn.launch-btn:hover { opacity: 0.88; color: #fff; }
    .action-btn.results-btn:hover { color: var(--accent); border-color: var(--accent); }
    .action-btn.copied { color: var(--success); border-color: var(--success); }
    .action-btn.delete-btn:hover { color: var(--danger); border-color: var(--danger); }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 11px;
      color: #333;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="logo">
      <img src="/favicon.svg" alt="" style="width:24px;height:24px">
      <h1>Scroll Stopper</h1>
    </div>
    <span class="sub"></span>
    <div class="spacer"></div>
    <button class="btn-new" onclick="toggleNewForm()">+ New Test</button>
  </div>

  <div class="new-form" id="new-form">
    <div class="new-form-inner">
      <div class="field">
        <label>Test Name</label>
        <input type="text" id="new-name" placeholder="e.g. Hook Test — Pitch v3" maxlength="80">
      </div>
      <button class="btn-create" id="create-btn" onclick="createTest()">Create</button>
    </div>
  </div>

  <div class="session-list" id="session-list"></div>

  <footer>&copy; S.E. Media, LLC 2026</footer>

  <script>
    // ── Load sessions ─────────────────────────────────────────────────────────

    async function loadSessions() {
      const list = document.getElementById('session-list');
      try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();

        if (!sessions.length) {
          list.innerHTML = '<div class="empty-state">No tests yet — click "+ New Test" to get started</div>';
          return;
        }

        list.innerHTML = '';
        sessions.forEach(s => list.appendChild(buildRow(s)));
      } catch {
        list.innerHTML = '<div class="empty-state">Could not load sessions</div>';
      }
    }

    function buildRow(session) {
      const row = document.createElement('div');
      row.className = 'session-row';

      const date = new Date(session.created_at).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric'
      });

      const stats = [];
      if (session.video_count) stats.push(`${session.video_count} video${session.video_count !== 1 ? 's' : ''}`);
      if (session.viewer_count) stats.push(`${session.viewer_count} viewer${session.viewer_count !== 1 ? 's' : ''}`);
      const statsText = stats.length ? ` · ${stats.join(' · ')}` : '';

      row.innerHTML = `
        <div class="session-indicator"></div>
        <div class="session-body">
          <div class="session-top">
            <div class="session-info">
              <div class="session-name" onclick="renameSession('${session.id}', this)">${escHtml(session.name)}</div>
              <div class="session-meta">${date}${statsText}</div>
            </div>
          </div>
          <div class="session-actions">
            <button class="action-btn setup-btn" onclick="location.href='setup.html?session=${session.id}'" title="Set up test">Setup</button>
            <button class="action-btn launch-btn" onclick="window.open('feed.html?session=${session.id}','_blank')" title="Open feed">Launch Feed</button>
            <button class="action-btn" onclick="copyLink(this, 'feed', '${session.id}')" title="Copy feed link">Copy Feed</button>
            <button class="action-btn" onclick="copyLink(this, 'results', '${session.id}')" title="Copy results link">Copy Results</button>
            <button class="action-btn results-btn" onclick="location.href='results.html?session=${session.id}'" title="View results">Results</button>
            <button class="action-btn delete-btn" onclick="deleteSession('${session.id}', this)" title="Delete test">Delete</button>
          </div>
        </div>
      `;

      return row;
    }

    // ── New test ──────────────────────────────────────────────────────────────

    function toggleNewForm() {
      const form = document.getElementById('new-form');
      form.classList.toggle('open');
      if (form.classList.contains('open')) {
        document.getElementById('new-name').focus();
      }
    }

    async function createTest() {
      const input = document.getElementById('new-name');
      const name = input.value.trim();
      if (!name) { input.focus(); return; }

      const btn = document.getElementById('create-btn');
      btn.disabled = true;
      btn.textContent = 'Creating…';

      try {
        const res = await fetch('/api/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        const data = await res.json();
        location.href = `setup.html?session=${data.id}`;
      } catch {
        btn.disabled = false;
        btn.textContent = 'Create';
        alert('Failed to create test.');
      }
    }

    // ── Actions ───────────────────────────────────────────────────────────────

    let cachedLocalIp = null;

    async function copyLink(btn, type, sessionId) {
      let base = location.origin;
      // On localhost, swap in local IP so links work on phone
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        if (!cachedLocalIp) {
          const cfg = await fetch('/api/config').then(r => r.json());
          cachedLocalIp = cfg.localIp;
        }
        if (cachedLocalIp) base = base.replace(location.hostname, cachedLocalIp);
      }
      const page = type === 'feed' ? 'feed.html' : 'results.html';
      const url = `${base}/${page}?session=${sessionId}`;
      await navigator.clipboard.writeText(url);
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = orig;
        btn.classList.remove('copied');
      }, 2000);
    }

    async function renameSession(sessionId, el) {
      const nameEl = el.classList.contains('session-name') ? el : el.closest('.session-row').querySelector('.session-name');
      const newName = prompt('New name:', nameEl.textContent);
      if (!newName || !newName.trim()) return;

      await fetch(`/api/sessions/${sessionId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: newName.trim() })
      });
      nameEl.textContent = newName.trim();
    }

    async function deleteSession(sessionId, btn) {
      if (!confirm('Delete this test and all its data?')) return;

      const row = btn.closest('.session-row');
      row.style.opacity = '0.3';

      await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
      row.remove();

      if (!document.querySelector('.session-row')) {
        document.getElementById('session-list').innerHTML =
          '<div class="empty-state">No tests yet — click "+ New Test" to get started</div>';
      }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    document.getElementById('new-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') createTest();
    });

    loadSessions();
  </script>
</body>
</html>
